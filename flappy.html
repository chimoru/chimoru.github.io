<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0a0612" />
<title>Flappy — Chimoru</title>
<link rel="icon" href="/favicon.ico" sizes="16x16 32x32" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  :root {
    --bg: #0a0612; --bg-grid: #140d28; --pink: #ff4dcb; --violet: #8b6dff;
    --cyan: #2ff3f3; --lime: #a6ff3d; --text: #ece7ff; --muted: #9488c4; --edge: #372a63;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text);
    font-family: "Courier New", ui-monospace, "Cascadia Code", monospace;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.25rem; overflow-x: hidden; -webkit-font-smoothing: none;
  }
  .crt-overlay { position: fixed; inset: 0; z-index: 50; pointer-events: none; background: repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.22) 2px 4px); mix-blend-mode: multiply; }
  .vignette { position: fixed; inset: 0; z-index: 49; pointer-events: none; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%); }
  .cabinet { position: relative; z-index: 1; width: 100%; max-width: 380px; text-align: center; }
  .eyebrow { color: var(--cyan); letter-spacing: 0.35em; text-transform: uppercase; font-size: 12px; margin: 0 0 0.75rem; }
  .eyebrow::before { content: "// "; color: var(--pink); }
  h1 { font-size: clamp(2.4rem, 12vw, 3.2rem); letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 1.25rem; color: #fff; text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 rgba(139,109,255,0.6), 0 0 18px rgba(255,77,203,0.4); }
  .scorebar { display: flex; justify-content: space-between; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
  .scorebar b { color: var(--cyan); font-weight: bold; }
  .scorebar .hi b { color: var(--lime); }
  #game { width: 100%; max-width: 340px; aspect-ratio: 340 / 440; height: auto; display: block; margin: 0 auto; border: 2px solid var(--edge); box-shadow: 0 0 22px rgba(139,109,255,0.35); image-rendering: pixelated; touch-action: none; cursor: pointer; }
  .hint { color: var(--muted); font-size: 11px; letter-spacing: 0.08em; line-height: 1.6; margin: 1rem 0 1.5rem; }
  .back { display: inline-block; font-family: inherit; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; color: var(--cyan); background: transparent; border: 2px solid var(--edge); padding: 10px 18px; box-shadow: 4px 4px 0 rgba(47,243,243,0.12); transition: transform 0.1s steps(2), color 0.1s, border-color 0.1s; }
  .back::before { content: "\25C0  "; }
  .back:hover { transform: translate(-2px,-2px); color: var(--pink); border-color: var(--pink); }
  .back:focus-visible, #game:focus-visible { outline: 3px solid var(--lime); outline-offset: 3px; }
  @media (prefers-reduced-motion: reduce) { .back { transition: none; } }
</style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="vignette"></div>
  <main class="cabinet">
    <p class="eyebrow">arcade</p>
    <h1>Flappy</h1>
    <div class="scorebar">
      <span>score <b id="score">0</b></span>
      <span class="hi">hi <b id="hi">0</b></span>
    </div>
    <canvas id="game" width="340" height="440" tabindex="0" aria-label="Flappy game board"></canvas>
    <p class="hint">space / click / tap to flap</p>
    <a class="back" href="/arcade.html">Back to arcade</a>
  </main>

  <script>
    (function () {
      var canvas = document.getElementById("game");
      var ctx = canvas.getContext("2d");
      var scoreEl = document.getElementById("score");
      var hiEl = document.getElementById("hi");
      var W = 340, H = 440;
      var GRAV = 0.45, FLAP = -7.2, SPEED = 2.2, PIPEW = 54, GAP = 132, SIZE = 20;
      var bird, pipes, score, state, ac, canRestart = true;
      var hi = parseInt(localStorage.getItem("chimoru_flappy_hi") || "0", 10);
      var last = 0, acc = 0, DT = 1000 / 60;

      function rand(n) { return Math.floor(Math.random() * n); }

      function playBlip() {
        try {
          var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
          ac = ac || new AC(); if (ac.state === "suspended") ac.resume();
          var t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
          o.type = "square"; o.frequency.value = 660;
          g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.1, t + 0.005);
          g.gain.exponentialRampToValueAtTime(0.0008, t + 0.08);
          o.connect(g).connect(ac.destination); o.start(t); o.stop(t + 0.09);
        } catch (e) {}
      }

      function reset() {
        bird = { x: 88, y: H * 0.42, vy: 0 };
        pipes = [];
        score = 0;
        state = "ready";
        updateScore(); draw();
      }
      function updateScore() { scoreEl.textContent = score; hiEl.textContent = hi; }
      function start() { if (state === "playing") return; if (state === "over") reset(); state = "playing"; }
      function flap() {
        if (state === "over" && !canRestart) return;
        if (state !== "playing") start();
        bird.vy = FLAP;
      }
      function over() {
        state = "over";
        canRestart = false;
        setTimeout(function () { canRestart = true; }, 900);
        if (score > hi) { hi = score; try { localStorage.setItem("chimoru_flappy_hi", String(hi)); } catch (e) {} updateScore(); }
      }

      function update() {
        bird.vy += GRAV; bird.y += bird.vy;
        if (!pipes.length || pipes[pipes.length - 1].x < W - 190) {
          pipes.push({ x: W, gap: 46 + rand(H - 92 - GAP), passed: false });
        }
        for (var i = 0; i < pipes.length; i++) pipes[i].x -= SPEED;
        while (pipes.length && pipes[0].x + PIPEW < 0) pipes.shift();
        var hs = SIZE / 2;
        if (bird.y + hs >= H || bird.y - hs <= 0) return over();
        for (var j = 0; j < pipes.length; j++) {
          var p = pipes[j];
          if (bird.x + hs > p.x && bird.x - hs < p.x + PIPEW) {
            if (bird.y - hs < p.gap || bird.y + hs > p.gap + GAP) return over();
          }
          if (!p.passed && p.x + PIPEW < bird.x - hs) { p.passed = true; score++; updateScore(); playBlip(); }
        }
      }

      function overlay(title, sub) {
        ctx.fillStyle = "rgba(10,6,18,0.74)"; ctx.fillRect(0, 0, W, H);
        ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.font = "bold 24px 'Courier New', monospace";
        ctx.fillText(title, W / 2, H / 2 - 4);
        ctx.fillStyle = "#9488c4"; ctx.font = "12px 'Courier New', monospace";
        ctx.fillText(sub, W / 2, H / 2 + 20);
      }
      function draw() {
        ctx.fillStyle = "#0a0612"; ctx.fillRect(0, 0, W, H);
        for (var j = 0; j < pipes.length; j++) {
          var p = pipes[j];
          ctx.fillStyle = "#8b6dff";
          ctx.fillRect(p.x, 0, PIPEW, p.gap);
          ctx.fillRect(p.x, p.gap + GAP, PIPEW, H - (p.gap + GAP));
          ctx.fillStyle = "#2ff3f3";
          ctx.fillRect(p.x, p.gap - 8, PIPEW, 8);
          ctx.fillRect(p.x, p.gap + GAP, PIPEW, 8);
        }
        var hs = SIZE / 2;
        ctx.fillStyle = "#ff4dcb";
        ctx.fillRect(bird.x - hs, bird.y - hs, SIZE, SIZE);
        ctx.fillStyle = "#0a0612";
        ctx.fillRect(bird.x + 1, bird.y - 5, 4, 4);
        if (state === "ready") overlay("PRESS START", "space / tap to flap");
        if (state === "over") overlay("GAME OVER", canRestart ? "score " + score + " · press start" : "score " + score);
      }

      function loop(t) {
        if (!last) last = t;
        acc += t - last; last = t;
        if (acc > 200) acc = 200;
        while (acc >= DT) { if (state === "playing") update(); acc -= DT; }
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", function (e) {
        if (e.key === " " || e.key === "Enter" || e.key === "ArrowUp" || e.key === "w") { e.preventDefault(); flap(); }
      });
      canvas.addEventListener("mousedown", function () { flap(); });
      canvas.addEventListener("touchstart", function (e) { e.preventDefault(); flap(); }, { passive: false });

      reset();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
